<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Admin</title>
    <link rel="stylesheet" href="../css/stlye_AdminMenuPrincipal.css">
</head>
<body>
    <div class="sidebar">
        <h2>ADMIN</h2> 
        <img src="../../assets/images/imss_logo.png" class="logoimss">
    </div>
    <div class="content">
        <!-- Barra de búsqueda -->
        <input type="text" id="search-bar" class="search-bar" placeholder="Buscar guardería..." oninput="filterDaycares()">
    
        <div id="daycare-list"></div>
    
        <div class="button-container">
            <button class="report-button" onclick="location.href=''">Reportes</button>
            <button class="add-button" onclick="addDaycare()">Agregar Guardería</button>
        </div>
    </div>
    
        
      <!-- Modal HTML -->
      <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <h2 id="modal-title"></h2>
            <input type="text" id="modal-input" class="modal-input" maxlength="150" placeholder="Ingrese el nombre de la guardería" />
    
            <!-- Campo de número de guardería -->
            <label for="num-guarderia">Número de Guardería:</label>
            <input type="text" id="num-guarderia" class="modal-input" placeholder="Ingrese el número de guardería" />
    
            <!-- Campos de fecha -->
            <label for="start-date">Fecha de Inicio:</label>
            <input type="date" id="start-date" class="modal-input" />
    
            <label for="end-date">Fecha de Término:</label>
            <input type="date" id="end-date" class="modal-input" />
            
            <button id="modal-confirm" onclick="modalConfirm()">Confirmar</button>
        </div>
    </div>
    

    </div>
<div id="delete-confirm-modal" class="modal">
    <div class="modal-content">
        <span class="close-button" onclick="closeDeleteConfirmModal()">&times;</span>
        <h2>Confirmar Eliminación</h2>
        <p>Escriba <strong>DELETE</strong> para confirmar la eliminación:</p>
        <input type="text" id="delete-confirm-input" class="modal-input" maxlength="6" placeholder="DELETE" />
        <button class="modal-confirm" onclick="confirmDelete()">Confirmar</button>
        <div id="delete-error" style="display: none; color: red; margin-top: 10px;">Texto incorrecto. Debes escribir "DELETE".</div>
    </div>
</div>


    
    <script src="../js/menuadmin.js"></script>
</body>
</html>
