<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
    <div class="flex min-h-screen flex-col lg:flex-row">
        <aside class="flex w-full items-center justify-between bg-gradient-to-br from-teal-900 to-teal-500 p-5 text-white lg:min-h-screen lg:w-72 lg:flex-col lg:justify-start lg:gap-6">
            <h2 class="text-2xl font-bold tracking-wide lg:text-4xl">ADMIN</h2>
            <img src="../../assets/images/icon.ico" class="h-16 w-16 rounded-xl bg-white/20 p-2 lg:mt-auto lg:h-24 lg:w-24" alt="Logo App">
        </aside>

        <main class="flex-1 p-4 sm:p-6 lg:p-8">
            <div class="mx-auto flex h-full w-full max-w-6xl flex-col gap-4">
                <input type="text" id="search-bar" class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" placeholder="Buscar guardería..." oninput="filterDaycares()">

                <div id="daycare-list" class="min-h-[300px] flex-1 space-y-3 overflow-y-auto rounded-xl border border-slate-200 bg-white p-3"></div>

                <div class="grid grid-cols-1 gap-3 pt-1 sm:grid-cols-2">
                    <button class="report-button rounded-xl border border-sky-600 px-4 py-3 font-semibold text-sky-700 transition hover:-translate-y-0.5 hover:bg-sky-50" onclick="location.href=''">Reportes</button>
                    <button class="add-button rounded-xl border border-emerald-600 px-4 py-3 font-semibold text-emerald-700 transition hover:-translate-y-0.5 hover:bg-emerald-50" onclick="addDaycare()">Agregar Guardería</button>
                </div>
                <button class="w-full rounded-xl border border-slate-400 px-4 py-3 font-semibold text-slate-600 transition hover:bg-slate-100 sm:w-auto" onclick="location.href='login.html'">Cerrar Sesión</button>
            </div>
        </main>
    </div>

    <div id="modal" class="modal fixed inset-0 hidden items-center justify-center bg-black/50 p-4">
        <div class="modal-content w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
            <div class="mb-4 flex items-center justify-between">
                <h2 id="modal-title" class="text-lg font-semibold"></h2>
                <button class="close-button text-xl text-slate-400 hover:text-slate-800" onclick="closeModal()">&times;</button>
            </div>
            <div class="space-y-3">
                <input type="text" id="modal-input" class="modal-input w-full rounded-lg border border-slate-200 px-3 py-2" maxlength="150" placeholder="Ingrese el nombre de la guardería" />
                <div>
                    <label for="num-guarderia" class="mb-1 block text-sm text-slate-600">Número de Guardería:</label>
                    <input type="text" id="num-guarderia" class="modal-input w-full rounded-lg border border-slate-200 px-3 py-2" placeholder="Ingrese el número de guardería" />
                </div>
                <div>
                    <label for="start-date" class="mb-1 block text-sm text-slate-600">Fecha de Inicio:</label>
                    <input type="date" id="start-date" class="modal-input w-full rounded-lg border border-slate-200 px-3 py-2" />
                </div>
                <div>
                    <label for="end-date" class="mb-1 block text-sm text-slate-600">Fecha de Término:</label>
                    <input type="date" id="end-date" class="modal-input w-full rounded-lg border border-slate-200 px-3 py-2" />
                </div>
            </div>
            <button id="modal-confirm" onclick="modalConfirm()" class="mt-5 w-full rounded-lg bg-teal-700 px-4 py-2 font-semibold text-white hover:bg-teal-800">Confirmar</button>
        </div>
    </div>

    <div id="delete-confirm-modal" class="modal fixed inset-0 hidden items-center justify-center bg-black/50 p-4">
        <div class="modal-content w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
            <div class="mb-4 flex items-center justify-between">
                <h2 class="text-lg font-semibold">Confirmar Eliminación</h2>
                <button class="close-button text-xl text-slate-400 hover:text-slate-800" onclick="closeDeleteConfirmModal()">&times;</button>
            </div>
            <p class="text-sm text-slate-600">Escriba <strong>DELETE</strong> para confirmar la eliminación.</p>
            <input type="text" id="delete-confirm-input" class="modal-input mt-3 w-full rounded-lg border border-slate-200 px-3 py-2" maxlength="6" placeholder="DELETE" />
            <button class="modal-confirm mt-4 w-full rounded-lg border border-slate-300 px-4 py-2 font-semibold text-slate-700 hover:bg-slate-100" onclick="confirmDelete()">Confirmar</button>
            <div id="delete-error" class="mt-2 hidden text-sm text-red-600">Texto incorrecto. Debes escribir "DELETE".</div>
        </div>
    </div>

    <script src="../js/menuadmin.js"></script>
</body>
</html>
