<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Usuario Contratos</title> 
    <link rel="stylesheet" href="../css/styleUsuarioMenu.css"> <!-- Asegúrate de que el archivo CSS sea el correcto -->
</head>
<body>
    <div class="sidebar">
        <h2>USUARIO</h2>
        <img src="../../assets/images/imss_logo.png" class="logoimss" alt="Logo IMSS">
    </div>
    <div class="content">
        <h1>Guardería n</h1>
        <p class="contract-dates">Contrato: De 03/09/2008 a 15/6/2029</p>
        <div id="daycare-list">
            <!-- Usar un bucle o un array en el JS para crear estos elementos sería más eficiente -->
            <div class="daycare-item-container">
                <button class="daycare-item" onclick="toggleDates(this)">Documento 1</button>
                <button class="edit-button" onclick="openDatePicker(this)">
                    <img src="../../assets/images/editafecha.png" class="icon" alt="Editar fechas">
                </button>
                <input type="checkbox" class="edit-checkbox" onclick="toggleCheckbox(this)">
            </div>
            <div class="daycare-item-container">
                <button class="daycare-item" onclick="toggleDates(this)">Documento 2</button>
                <button class="edit-button" onclick="openDatePicker(this)">
                    <img src="../../assets/images/editafecha.png" class="icon" alt="Editar fechas">
                </button>
                <input type="checkbox" class="edit-checkbox" onclick="toggleCheckbox(this)">
            </div>
            <div class="daycare-item-container">
                <button class="daycare-item" onclick="toggleDates(this)">Documento 3</button>
                <button class="edit-button" onclick="openDatePicker(this)">
                    <img src="../../assets/images/editafecha.png" class="icon" alt="Editar fechas">
                </button>
                <input type="checkbox" class="edit-checkbox" onclick="toggleCheckbox(this)">
            </div>
            <div class="daycare-item-container">
                <button class="daycare-item" onclick="toggleDates(this)">Documento 4</button>
                <button class="edit-button" onclick="openDatePicker(this)">
                    <img src="../../assets/images/editafecha.png" class="icon" alt="Editar fechas">
                </button>
                <input type="checkbox" class="edit-checkbox" onclick="toggleCheckbox(this)">
            </div>
            <div class="daycare-item-container">
                <button class="daycare-item" onclick="toggleDates(this)">Documento 5</button>
                <button class="edit-button" onclick="openDatePicker(this)">
                    <img src="../../assets/images/editafecha.png" class="icon" alt="Editar fechas">
                </button>
                <input type="checkbox" class="edit-checkbox" onclick="toggleCheckbox(this)">
            </div>
            <!-- Añadir más documentos aquí si es necesario -->
        </div>
        <button class="back-button" onclick="location.href='adminMenuPrincipal.html'">Regresar</button>
    </div>

    <!-- Modal para la selección de fechas -->
    <div id="date-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Selecciona las fechas</h2>
            <label for="start-date">Fecha inicial:</label>
            <input type="date" id="start-date">
            <br><br>
            <label for="end-date">Fecha final:</label>
            <input type="date" id="end-date">
            <br><br>
            <button onclick="saveDates()">Aceptar</button>
            <button onclick="closeModal()">Cancelar</button>
        </div>
    </div>

    <script src="../js/usuarioMenu.js"></script>
</body>
</html>
