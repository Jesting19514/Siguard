<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Usuario Contratos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">
    <div class="flex min-h-screen flex-col lg:flex-row">
        <aside class="sidebar flex w-full items-center justify-between bg-gradient-to-br from-teal-900 to-teal-500 p-5 text-white lg:min-h-screen lg:w-72 lg:flex-col lg:justify-start lg:gap-6">
            <h2 class="text-2xl font-bold lg:text-4xl">USUARIO</h2>
            <img src="../../assets/images/icon.ico" class="logoApp h-16 w-16 rounded-xl bg-white/20 p-2 lg:mt-auto lg:h-24 lg:w-24" alt="Logo aplicación">
        </aside>

        <main class="content flex-1 p-4 sm:p-6 lg:p-8">
            <div class="mx-auto flex h-full w-full max-w-6xl flex-col gap-4">
                <h1 class="text-2xl font-bold text-slate-700 sm:text-3xl">Guardería n</h1>
                <p class="contract-dates text-sm text-slate-500">Contrato: De 03/09/2008 a 15/6/2029</p>

                <div id="daycare-list" class="space-y-3 overflow-y-auto rounded-xl border border-slate-200 bg-white p-3"></div>
                <p id="empty-documents-message" class="hidden rounded-xl border border-dashed border-slate-300 bg-slate-50 px-4 py-6 text-center text-sm text-slate-500">
                    No hay documentos para esta guardería todavía.
                </p>

                <button class="w-full rounded-xl border border-emerald-600 px-4 py-3 font-semibold text-emerald-700 transition hover:-translate-y-0.5 hover:bg-emerald-50 sm:w-auto" onclick="openCreateDocumentModal()">
                    Crear Documento
                </button>

                <button class="back-button mt-auto w-full rounded-xl border border-slate-400 px-4 py-3 font-semibold text-slate-600 hover:bg-slate-100 sm:w-auto" onclick="location.href='login.html'">Cerrar Sesión</button>
            </div>
        </main>
    </div>

    <div id="date-modal" class="modal fixed inset-0 hidden items-center justify-center bg-black/50 p-4">
        <div class="modal-content w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
            <h2 class="mb-4 text-lg font-semibold">Selecciona las fechas</h2>
            <label for="start-date" class="mb-1 block text-sm text-slate-600">Fecha inicial:</label>
            <input type="date" id="start-date" class="w-full rounded-lg border border-slate-200 px-3 py-2">
            <label for="end-date" class="mb-1 mt-3 block text-sm text-slate-600">Fecha final:</label>
            <input type="date" id="end-date" class="w-full rounded-lg border border-slate-200 px-3 py-2">
            <div class="mt-5 grid grid-cols-2 gap-2">
                <button class="rounded-lg bg-teal-700 px-4 py-2 font-semibold text-white hover:bg-teal-800" onclick="saveDates()">Aceptar</button>
                <button class="rounded-lg border border-slate-300 px-4 py-2 font-semibold text-slate-600 hover:bg-slate-100" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="create-document-modal" class="modal fixed inset-0 hidden items-center justify-center bg-black/50 p-4">
        <div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-xl">
            <div class="mb-4 flex items-center justify-between">
                <h2 class="text-lg font-semibold">Crear documento</h2>
                <button class="text-xl text-slate-400 hover:text-slate-700" onclick="closeCreateDocumentModal()">&times;</button>
            </div>
            <div class="space-y-3">
                <div>
                    <label for="document-name" class="mb-1 block text-sm text-slate-600">Nombre del documento:</label>
                    <input type="text" id="document-name" maxlength="150" class="w-full rounded-lg border border-slate-200 px-3 py-2">
                </div>
                <div>
                    <label for="document-start-date" class="mb-1 block text-sm text-slate-600">Fecha inicial:</label>
                    <input type="date" id="document-start-date" class="w-full rounded-lg border border-slate-200 px-3 py-2">
                </div>
                <div>
                    <label for="document-end-date" class="mb-1 block text-sm text-slate-600">Fecha final:</label>
                    <input type="date" id="document-end-date" class="w-full rounded-lg border border-slate-200 px-3 py-2">
                </div>
            </div>
            <button class="mt-5 w-full rounded-lg bg-teal-700 px-4 py-2 font-semibold text-white hover:bg-teal-800" onclick="createDocument()">Guardar documento</button>
        </div>
    </div>

    <script src="../js/usuarioMenu.js"></script>
</body>
</html>
