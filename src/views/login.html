<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"

</head>

<body>

    <img src="../../assets/images/imss_logo.png" id="imgIMSS">

    <div id="Login">


        <div class="container">
            <img src="../../assets/images/siguard.svg" class="siguardLogo">
            <form action="/my-handling-form-page" method="post" class="formulario">
                <ul>
                    <li>
                        <label for="correo">Usuario</label>
                        <input type="text" id="name" name="user_name" placeholder="Correo electrónico" />
                    </li>
                    <li>
                        <label for="password">Contraseña</label>
                        <input type="password" id="mail" name="user_mail" placeholder="Contraseña" />
                    </li>

                </ul>
            </form>


            <button class="unbtn">Entrar</button>
        </div>
    </div>

</body>

</html>
