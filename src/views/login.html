<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Inter", system-ui; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-teal-900 to-teal-500">
    <main class="mx-auto flex min-h-screen w-full max-w-7xl items-center justify-center gap-8 px-4 py-8 lg:justify-between">
        <section class="hidden lg:flex lg:w-1/2 lg:justify-center">
            <img src="../../assets/images/icon.ico" id="imgApp" alt="Logo App" class="max-h-[55vh] w-auto object-contain opacity-95">
        </section>

        <section class="w-full max-w-md rounded-3xl bg-white p-8 shadow-2xl sm:p-10">
            <div class="mb-8 flex justify-center">
                <img src="../../assets/images/siguard.svg" class="h-20 w-auto sm:h-24" alt="Siguard">
            </div>

            <form class="space-y-5" onsubmit="login(event)">
                <div>
                    <label for="name" class="mb-2 block text-sm font-semibold text-slate-700">Usuario</label>
                    <input type="text" id="name" name="user_name" placeholder="ID Usuario" class="w-full rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" />
                </div>
                <div>
                    <label for="password" class="mb-2 block text-sm font-semibold text-slate-700">Contraseña</label>
                    <input type="password" id="password" name="user_password" placeholder="Contraseña" class="w-full rounded-xl border border-slate-200 bg-slate-100 px-4 py-3 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-200" />
                </div>
                <button class="w-full rounded-xl bg-teal-700 px-4 py-3 font-semibold text-white transition hover:-translate-y-0.5 hover:bg-teal-800">Entrar</button>
            </form>
        </section>
    </main>

    <div id="errorModal" class="modal fixed inset-0 hidden items-center justify-center bg-black/50 p-4">
        <div class="w-full max-w-sm rounded-2xl bg-white p-6 shadow-xl">
            <div class="mb-3 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-red-700">Error al iniciar sesión</h2>
                <button class="text-xl text-slate-400 hover:text-slate-700" onclick="closeModal()">&times;</button>
            </div>
            <p id="errorMessage" class="text-sm text-slate-700">Credenciales incorrectas.</p>
        </div>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
