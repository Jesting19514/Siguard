<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <img src="../../assets/images/imss_logo.png" id="imgIMSS">

    <div id="Login">


        <div class="container">
            <img src="../../assets/images/siguard.svg" class="siguardLogo">
            <form id="formLogin" class="formulario">
                <ul>
                    <li>
                        <label for="username">Usuario</label>
                        <input type="text" id="usernameForm" placeholder="Correo electrónico" />
                    </li>
                    <li>
                        <label for="password">Contraseña</label>
                        <input type="password" id="passwordForm" placeholder="Contraseña" />
                    </li>

                </ul>
            </form>

            <button class="unbtn" id="btnLogin">Entrar</button>
            <button id="token">muestra token guardado</button>
            <button id="token2">elimina token</button>
            <button id="btnPruebas">Agrega Guarderia</button>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>

</html>
