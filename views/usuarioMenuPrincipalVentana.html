    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menu Usuario</title>
        <link rel="stylesheet" href="../src/css/styleUsuarioMenu.css">
    </head>
    <body>
        <div class="sidebar">
            <h2>USUARIO</h2> 
            <img src="../src/assets/images/imss_logo.png" class="logoimss">
        </div>
        <div class="content">
            <h1>GUARDERIA X</h1>
            
            <div class="daycare-item-container" style="position: relative;">
                <button id="toggle-doc" class="daycare-item">DOCUMENTO X</button>
                <button class="edit-button" onclick="editName(this)" style="position: absolute; right: 0; top: 50%; transform: translateY(-50%);">
                    <img src="../src/assets/images/edit_icon.png" class="icon">
                </button>
                    <div class="menu-input hidden">
                        <label for="start-date">Fecha de inicio:</label>
                        <input type="date" id="start-date" />
                        <label for="end-date">Fecha de término:</label>
                        <input type="date" id="end-date" />
                    </div>
                </div>
            </div>
            
        </div>
        <script src="../src/js/menuadmin.js"></script>
    </body>
    </html>
